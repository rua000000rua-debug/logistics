<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>物流查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
        }

        .search-card {
            background: white;
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .input-group input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #e8ecf0;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            background: #fafbfc;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        .input-group input::placeholder {
            color: #94a3b8;
            font-weight: normal;
        }

        .input-group button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(102,126,234,0.3);
        }

        .input-group button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(102,126,234,0.4);
        }

        .result-card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tracking-header {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 16px 20px;
            border-radius: 24px;
            margin-bottom: 28px;
            border-left: 5px solid #667eea;
        }

        .tracking-label {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .tracking-number {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            word-break: break-all;
            font-family: monospace;
        }

        .timeline {
            position: relative;
            padding-left: 28px;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 28px;
            border-left: 2px solid #e2e8f0;
            margin-left: 10px;
            padding-left: 24px;
        }

        .timeline-item:last-child {
            border-left: 2px solid transparent;
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -33px;
            top: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #cbd5e0;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #cbd5e0;
        }

        .timeline-item:first-child .timeline-dot {
            background: #48bb78;
            box-shadow: 0 0 0 2px #48bb78;
        }

        .timeline-date {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            display: inline-block;
            background: #ede9fe;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .timeline-content {
            color: #334155;
            line-height: 1.5;
            font-size: 15px;
            margin-top: 8px;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #667eea;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 30px;
            padding: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 0; }
            .search-card, .result-card { padding: 20px; }
            .input-group { flex-direction: column; }
            .input-group button { padding: 14px; }
            .tracking-number { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-icon">📦</div>
        <h1>物流查询系统</h1>
        <p>输入运单号，一键追踪包裹动态</p>
    </div>

    <div class="search-card">
        <div class="input-group">
            <input type="text" id="trackingInput" placeholder="请输入运单号" autocomplete="off" />
            <button onclick="doSearch()">查 询</button>
        </div>
    </div>

    <div id="result" class="result-card"></div>
    <div class="footer">如有疑问请联系客服</div>
</div>

<script>
    // ============================================================
    // 物流数据库 - 在这里添加/修改单号和轨迹
    // 注意：按时间从早到晚排序（最早的在上，最新的在下）
    // ============================================================
    var logisticsDatabase = {
        "PXU012605124-1": [
            "2026-05-18 09:52:48 订单已创建",
            "2026-05-18 10:11:19 货物装载完毕，货物已从仓库发出",
            "2026-05-18 22:02:07 货物已装载完毕，已发车去出境口岸",
            "2026-05-25 10:01:54 货物已经到达出境口岸",
            "2026-05-28 10:01:58 口岸已换装"
        ],
        "PXM1002605152-1": [
            "2026-05-19 10:05:46 订单已创建",
            "2026-05-19 10:23:13 货物装载完毕，货物已从仓库发出",
            "2026-05-19 15:02:10 货物装载完毕，货物已从仓库发出",
            "2026-05-26 10:01:40 货物抵达口岸，等待过境车换装",
            "2026-05-27 10:01:53 货物已换装完成"
        ],
        "PXU03260621-1": [
            "2026-06-04 10:25:46 订单已创建",
            "2026-06-04 10:32:53 货物装载完毕，货物已从仓库发出"
        ]
    };
    // ============================================================

    function doSearch() {
        var trackingNumber = document.getElementById('trackingInput').value.trim();
        var resultDiv = document.getElementById('result');

        if (trackingNumber === "") {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = '<div class="error-message">⚠️ 请输入运单号</div>';
            return;
        }

        resultDiv.style.display = "block";
        resultDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>正在查询...</div></div>';

        setTimeout(function() {
            var logistics = logisticsDatabase[trackingNumber];

            if (logistics && logistics.length > 0) {
                var timelineHtml = '<div class="timeline">';
                for (var i = 0; i < logistics.length; i++) {
                    var item = logistics[i];
                    var time = "";
                    var content = item;
                    
                    var timeMatch = item.match(/^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})/);
                    if (timeMatch) {
                        time = timeMatch[1];
                        content = item.substring(timeMatch[0].length).trim();
                    }
                    
                    timelineHtml += '<div class="timeline-item">';
                    timelineHtml += '<div class="timeline-dot"></div>';
                    if (time) {
                        timelineHtml += '<div class="timeline-date">' + time + '</div>';
                    }
                    timelineHtml += '<div class="timeline-content">' + content + '</div>';
                    timelineHtml += '</div>';
                }
                timelineHtml += '</div>';
                
                var fullHtml = '<div class="tracking-header">' +
                    '<div class="tracking-label">运单号码</div>' +
                    '<div class="tracking-number">' + trackingNumber + '</div>' +
                    '</div>' + timelineHtml;
                
                resultDiv.innerHTML = fullHtml;
            } else {
                resultDiv.innerHTML = '<div class="error-message">❌ 未找到单号<br/>请确认后重新输入</div>';
            }
        }, 200);
    }

    document.getElementById('trackingInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            doSearch();
        }
    });
</script>
</body>
</html>
