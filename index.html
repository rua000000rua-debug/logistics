<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>物流查询系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .logo { text-align: center; color: white; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; margin-bottom: 10px; }
        .logo p { opacity: 0.9; }
        .search-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .search-box { display: flex; gap: 10px; margin-bottom: 0; }
        .search-box input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        .search-box input:focus { outline: none; border-color: #667eea; }
        .search-box button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .result-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        .tracking-number {
            background: #f7fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .timeline { position: relative; padding-left: 30px; }
        .timeline-item {
            position: relative;
            padding-bottom: 20px;
            border-left: 2px solid #e2e8f0;
            margin-left: 10px;
            padding-left: 20px;
        }
        .timeline-item:last-child { border-left: 2px solid transparent; }
        .timeline-dot {
            position: absolute;
            left: -33px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd5e0;
        }
        .timeline-item:first-child .timeline-dot { background: #48bb78; }
        .timeline-date { font-size: 12px; color: #718096; margin-bottom: 4px; }
        .timeline-content { color: #2d3748; white-space: pre-wrap; word-break: break-word; }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        footer { text-align: center; color: white; margin-top: 30px; font-size: 12px; }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>📦 物流查询系统</h1>
        <p>请输入您的运单号查询物流信息</p>
    </div>
    <div class="search-card">
        <div class="search-box">
            <input type="text" id="trackingInput" placeholder="请输入运单号" autocomplete="off" />
            <button onclick="searchTracking()">查询</button>
        </div>
    </div>
    <div id="result" class="result-card"></div>
    <footer>如有疑问请联系客服</footer>
</div>

    function searchTracking() {
        var trackingNumber = document.getElementById('trackingInput').value.trim();
        var resultDiv = document.getElementById('result');

        if (trackingNumber === "") {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = '<div class="error-message">⚠️ 请输入运单号</div>';
            return;
        }

        resultDiv.style.display = "block";
        resultDiv.innerHTML = '<div class="loading">🔍 查询中...</div>';

        setTimeout(function() {
            var logistics = logisticsDatabase[trackingNumber];

            if (logistics) {
                var timelineHtml = '<div class="timeline">';
                // 从旧到新显示（正序）
                for (var i = logistics.length - 1; i >= 0; i--) {
                    var item = logistics[i];
                    var time = "";
                    var content = item;
                    var timeMatch = item.match(/^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})/);
                    if (timeMatch) {
                        time = timeMatch[1];
                        content = item.substring(timeMatch[0].length).trim();
                    }
                    timelineHtml += '<div class="timeline-item"><div class="timeline-dot"></div>';
                    if (time) timelineHtml += '<div class="timeline-date">' + time + '</div>';
                    timelineHtml += '<div class="timeline-content">' + content + '</div></div>';
                }
                timelineHtml += '</div>';
                resultDiv.innerHTML = '<div class="tracking-number">🔍 运单号：' + trackingNumber + '</div>' + timelineHtml;
            } else {
                resultDiv.innerHTML = '<div class="error-message">❌ 未找到运单号 ' + trackingNumber + ' 的信息</div>';
            }
        }, 100);
    }

    document.getElementById('trackingInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchTracking();
    });
</script>
