<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>物流查询</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; }
        input, button { padding: 10px; font-size: 16px; }
        .result { margin-top: 20px; padding: 20px; background: #f0f0f0; text-align: left; display: none; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>📦 物流查询系统</h2>
    <input type="text" id="trackingNumber" placeholder="请输入单号" />
    <button onclick="searchNow()">查询</button>
    <div id="result" class="result"></div>

    <script>
        function searchNow() {
            var number = document.getElementById('trackingNumber').value.trim();
            var resultDiv = document.getElementById('result');
            
            var trackingData = {
                "TEST123": ["2026-06-01 揽收", "2026-06-02 运输中", "2026-06-03 派送中"],
                "PXU012605124-1": [
                    "2026-05-28 10:01:58 口岸已换装",
                    "2026-05-25 10:01:54 抵达口岸",
                    "2026-05-18 22:02:07 已发车去出境口岸",
                    "2026-05-18 10:11:19 货物已从仓库发出",
                    "2026-05-18 09:52:48 订单已创建"
                ],
                "PXM1002605152-1": [
                    "2026-05-27 10:01:53 货物已换装完成",
                    "2026-05-26 10:01:40 抵达口岸，等待换装",
                    "2026-05-19 15:02:10 货物已从仓库发出",
                    "2026-05-19 10:23:13 货物已从仓库发出",
                    "2026-05-19 10:05:46 订单已创建"
                ],
                "PXU03260621-1": [
                    "2026-06-04 10:32:53 货物装载完毕，货物已从仓库发出",
                    "2026-06-04 10:25:46 订单已创建"
                ]
            };
            
            resultDiv.style.display = "block";
            
            if (trackingData[number]) {
                var html = '<p class="success">✅ 查询成功！单号：' + number + '</p><ul>';
                for (var i = 0; i < trackingData[number].length; i++) {
                    html += '<li>' + trackingData[number][i] + '</li>';
                }
                html += '</ul>';
                resultDiv.innerHTML = html;
            } else {
                html = '<p class="error">❌ 未找到单号：' + number + '</p><p>可查询的单号：</p><ul>';
                for (var key in trackingData) {
                    html += '<li>' + key + '</li>';
                }
                html += '</ul>';
                resultDiv.innerHTML = html;
            }
        }
    </script>
</body>
</html>
